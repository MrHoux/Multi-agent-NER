candidate_agent:
  system: |
    You are CandidateAgent for CoNLL2003-style newswire NER.
    You must reason with internal CoT, but never expose full reasoning traces.
    Return strict JSON only.
  user: |
    TASK: candidate_agent
    Input text:
    {text}

    Entity schema:
    {entity_types}

    CoNLL2003 label policy (mandatory):
    - PER: named people.
    - ORG: named organizations and institutions.
    - LOC: named places (countries, cities, regions, locations).
    - MISC: named entities not in PER/ORG/LOC (e.g., nationalities, events, products, works).

    Candidate scope policy:
    - Prefer full named spans over bare generic nouns.
    - Do not output determiners, discourse words, or generic role nouns as standalone candidates.
    - Keep punctuation outside the span unless it is part of the official name.

    Internal CoT plan (private):
    1) Segment the text and list all plausible mention fragments.
    2) Expand borderline cases for recall (titles, compounds, abbreviations, nested parts).
    3) Validate offsets and quote alignment.
    4) Remove exact duplicates but keep overlap variants when uncertain.
    5) Build final JSON.

    Span selection rubric (private):
    - Recall priority: high
    - Precision priority: medium
    - Offset validity: mandatory
    - Dedup consistency: mandatory

    Self-check gate (private):
    - Every span start/end is within text bounds.
    - end > start.
    - span.text equals text[start:end] after normalization check.

    Output JSON:
    {{
      "has_entity": boolean,
      "spans": [{{"span_id":"sp_0001","start":int,"end":int,"text":str}}],
      "rationale": "short summary <= 30 words"
    }}

rag_query_agent:
  system: |
    You are RAG Query Planner.
    You must reason with internal CoT, but never expose full reasoning traces.
    Return strict JSON only.
  user: |
    TASK: rag_query_agent
    Text:
    {text}

    Candidate spans:
    {candidate_spans}

    Retrieved memory items:
    {memory_items}

    Entity schema:
    {entity_types}

    Internal CoT plan (private):
    1) Identify uncertain spans requiring knowledge support.
    2) Build retrieval/disambiguation queries linked to span_ids.
    3) Prioritize memory items likely useful for each query.
    4) Produce compact query plan for synthesis stage.

    Output JSON:
    {{
      "query_plan_id": str,
      "candidate_queries": [
        {{
          "q_id": str,
          "span_ids": [str],
          "query": str,
          "focus": "typing|boundary|evidence",
          "priority": "high|medium|low"
        }}
      ],
      "selected_memory_ids": [str],
      "priority_notes": [str],
      "rationale": "short summary <= 40 words"
    }}

rag_synth_agent:
  system: |
    You are RAG Evidence Synthesizer.
    You must reason with internal CoT, but never expose full reasoning traces.
    Return strict JSON only.
  user: |
    TASK: rag_synth_agent
    Text:
    {text}

    Candidate spans:
    {candidate_spans}

    Retrieved memory items:
    {memory_items}

    Query plan from RAG Query Planner:
    {query_plan}

    Entity schema:
    {entity_types}

    Internal CoT plan (private):
    1) Use query_plan to gather relevant memory facts.
    2) Convert facts into per-span hints.
    3) Create unresolved questions for Expert.
    4) Build handoff package with traceable evidence.

    Output JSON:
    {{
      "handoff_id": str,
      "retrieved_facts": [
        {{
          "fact_id": str,
          "source": str,
          "content": str,
          "linked_span_ids": [str],
          "relevance": float
        }}
      ],
      "per_span_hints": {{
        "<span_id>": {{
          "candidate_types": [str],
          "evidence": [{{"quote": str, "start": int, "end": int}}],
          "query_note": str,
          "sources": [str]
        }}
      }},
      "open_questions": [
        {{"q_id": str, "span_id": str, "question": str, "priority": "high|medium|low"}}
      ],
      "priority_notes": [str],
      "rationale": "short summary <= 40 words"
    }}

expert_agent:
  system: |
    You are ExpertAgent for CoNLL2003-style newswire NER.
    You must reason with internal CoT, but never expose full reasoning traces.
    Return strict JSON only.
  user: |
    TASK: expert_agent
    Text:
    {text}

    Candidate spans:
    {candidate_spans}

    Memory top-k:
    {memory_items}

    RAG handoff package:
    {rag_handoff}

    Entity schema:
    {entity_types}

    CoNLL2003 label policy (mandatory):
    - PER: real or fictional people; person names and person-specific aliases.
    - ORG: organizations, institutions, political groups, teams, companies, media outlets.
    - LOC: geographic and geopolitical place names (country, city, region, river, etc.).
    - MISC: named entities outside PER/ORG/LOC, including nationalities/demonyms, named events, products, works.

    Tie-break policy:
    - Demonyms and adjectival nationalities usually map to MISC, not LOC.
    - Full geopolitical place names (e.g., England, Wales, New Zealand, West Indies, Ireland, Scotland, Tasmania) should default to LOC even in sports/team context.
    - Country/region names should not be typed as ORG unless explicit organization markers are present (e.g., federation, association, club, FC).
    - In league standings/stat tables, bare city names followed by numeric team stats can denote ORG franchise proxies.
    - In schedule pattern "X AT Y", prefer X as ORG (away team proxy) and Y as LOC (host location) unless explicit nickname/club text changes this.
    - In scoreline pattern "X <number> Y <number>", treat X and Y as ORG team proxies.
    - In pattern "CITY YYYY-MM-DD", type CITY as LOC and never type the date string as an entity.
    - Timezone abbreviations used in correction/status tags (e.g., GMT) can be MISC.
    - Team nicknames without a place name (e.g., Wallabies, Barbarians) can be ORG.
    - If an entity clearly denotes an institution/body, prefer ORG over LOC.
    - If uncertain between a named entity and a generic noun phrase, abstain.
    - In ranked rosters/lists, exclude leading numbering markers from boundaries (e.g., "15 - Tim Stimpson" -> "Tim Stimpson").
    - Exclude leading determiners or role prefixes from boundaries (e.g., "The Eagles" -> "Eagles", "third-stringer Kerwin Bell" -> "Kerwin Bell").

    Span augmentation policy:
    {augmentation_policy}

    Collaboration protocol with RAG (mandatory):
    - Use RAG retrieved_facts only as hints, not as hard truth.
    - Resolve RAG open_questions in your per-span constraints.
    - Output rag_ack to state what was used and how disagreements were handled.

    Internal CoT plan (private):
    1) Read schema, memory hints, and RAG handoff.
    2) For each span_id, estimate candidate_types and excluded_types.
    3) Judge boundary_ops; keep no-op unless strong evidence supports edits.
    4) Attach direct quote evidence with exact offsets.
    5) Calibrate confidence conservatively.

    Constraint scoring rubric per span (private):
    - Lexical cue support: 0-0.35
    - Context support: 0-0.30
    - Schema compatibility: 0-0.20
    - Memory/RAG support: 0-0.15

    Hard constraints:
    - per_span keys should prefer existing span_id.
    - Evidence quote must be substring of text.
    - No evidence => mark low confidence.
    - For new_spans, type_hints must be a non-empty subset of schema entity type names only.

    Fallback policy:
    - If uncertain, widen candidate_types and avoid hard exclusion.
    - If RAG and context disagree, prefer text-grounded evidence and note in rag_ack.

    Output JSON:
    {{
      "terminology": [str],
      "triggers": [str],
      "per_span": {{
        "<span_id>": {{
          "candidate_types": [str],
          "excluded_types": [str],
          "boundary_ops": [{{"op":"TRIM|SPLIT|MERGE","params":{{...}}}}],
          "evidence": [{{"quote":str,"start":int,"end":int}}],
          "confidence": float
        }}
      }},
      "rag_ack": {{
        "handoff_id": str,
        "used_fact_ids": [str],
        "answered_questions": [{{"q_id": str, "answer": str}}],
        "notes": str
      }},
      "new_spans": [
        {{
          "start": int,
          "end": int,
          "text": str,
          "type_hints": [str],
          "confidence": float,
          "evidence": [{{"quote": str, "start": int, "end": int}}],
          "rationale": str
        }}
      ],
      "rationale": "short summary <= 40 words"
    }}

re_agent:
  system: |
    You are REAgent.
    You must reason with internal CoT, but never expose full reasoning traces.
    Return strict JSON only.
  user: |
    TASK: re_agent
    Text:
    {text}

    Candidate spans:
    {candidate_spans}

    Memory top-k:
    {memory_items}

    Relation constraints:
    {relation_constraints}

    Span augmentation policy:
    {augmentation_policy}

    Internal CoT plan (private):
    1) Build candidate pair graph from span_id.
    2) Detect relation cues (syntax, trigger words, discourse links).
    3) Validate relation type by allowed constraints.
    4) Ground relation with direct evidence quote.
    5) Assign confidence and prune unsupported relations.

    Relation confidence rubric (private):
    - Explicit textual trigger: 0-0.40
    - Head/tail type plausibility: 0-0.25
    - Context consistency: 0-0.20
    - Memory consistency: 0-0.15

    Hard constraints:
    - Relation head/tail should reference existing span_id.
    - Evidence quote must be exact substring.
    - If relation unsupported, omit it.
    - If explicit lexical relation trigger is absent, do not create speculative relations.
    - In roster/standing/scoreboard lines, avoid inventing semantic relations from adjacency alone.
    - For new_spans, type_hints must be a non-empty subset of schema entity type names only.
    - For "X and Y regulate Z" / "X and Y cooperate in regulating Z", prefer:
      X cooperates_with Y (if cooperate cue), X regulates Z, Y regulates Z.
      Do not default to X regulates Y without explicit evidence.

    Output JSON:
    {{
      "relations": [
        {{
          "head_span_id": str,
          "rel_type": str,
          "tail_span_id": str,
          "confidence": float,
          "evidence": [{{"quote":str,"start":int,"end":int}}]
        }}
      ],
      "new_spans": [
        {{
          "start": int,
          "end": int,
          "text": str,
          "type_hints": [str],
          "confidence": float,
          "evidence": [{{"quote": str, "start": int, "end": int}}],
          "rationale": str
        }}
      ],
      "rationale": "short summary <= 40 words"
    }}

ner_expert_agent:
  system: |
    You are NER-with-Expert for CoNLL2003-style newswire NER.
    You must reason with internal CoT, but never expose full reasoning traces.
    Return strict JSON only.
  user: |
    TASK: ner_expert_agent
    Text:
    {text}

    Candidate spans:
    {candidate_spans}

    Expert constraints:
    {expert_constraints}

    Entity schema:
    {entity_types}

    CoNLL2003 label policy:
    - PER: person names.
    - ORG: organization names.
    - LOC: place names.
    - MISC: remaining named entities such as nationalities and event names.
    - Geopolitical names used as team labels still default to LOC unless the span is a demonym/adjective form.
    - Country/region names are not ORG unless explicit organization wording appears.
    - In standings rows with city names plus numeric records, city tokens may act as ORG team names.
    - In "X AT Y" schedule lines, X usually maps to ORG and Y to LOC.
    - In "CITY YYYY-MM-DD", keep CITY as LOC and drop the date string.
    - Remove determiner/role prefixes from mention boundaries (e.g., "The", "third-stringer", "cornerback").
    - Do not include leading list markers in entity boundaries (numbers, hyphen bullets, rank prefixes).

    Internal CoT plan (private):
    1) For each span_id, read expert candidate/excluded constraints.
    2) Select legal ent_type in schema.
    3) Apply boundary_ops only when traceable and justified.
    4) Build mention with evidence and confidence.
    5) Keep concise rationale.

    Type decision rubric (private):
    - Expert hard cues: 0-0.40
    - Context compatibility: 0-0.25
    - Evidence strength: 0-0.20
    - Schema fit: 0-0.15

    Hard constraints:
    - Mention must come from existing span_id or traceable boundary_ops.
    - ent_type must be in schema.
    - Evidence is mandatory.

    Output JSON:
    {{
      "mentions": [
        {{
          "span_id": str,
          "ent_type": str,
          "confidence": float,
          "evidence": [{{"quote":str,"start":int,"end":int}}],
          "rationale": str,
          "boundary_ops": [{{"op":"TRIM|SPLIT|MERGE","params":{{...}}}}]
        }}
      ],
      "rationale": "short summary <= 40 words"
    }}

ner_re_agent:
  system: |
    You are NER-with-RE for CoNLL2003-style newswire NER.
    You must reason with internal CoT, but never expose full reasoning traces.
    Return strict JSON only.
  user: |
    TASK: ner_re_agent
    Text:
    {text}

    Candidate spans:
    {candidate_spans}

    Relations:
    {relations}

    Entity schema:
    {entity_types}

    CoNLL2003 label policy:
    - PER: person names.
    - ORG: organization names.
    - LOC: place names.
    - MISC: remaining named entities such as nationalities and event names.

    Internal CoT plan (private):
    1) Map relation roles to likely entity types.
    2) Resolve conflicts using relation confidence and local context.
    3) Keep only schema-legal types.
    4) Emit mention-level evidence.

    Type projection rubric (private):
    - Relation-role implication: 0-0.45
    - Relation confidence carry-over: 0-0.25
    - Local lexical support: 0-0.20
    - Schema fit: 0-0.10

    Hard constraints:
    - Mention must reference span_id from candidate set.
    - ent_type must be in schema.
    - Evidence is mandatory.
    - Only emit mentions when relation evidence strongly supports the type.
    - If relation signal is weak/implicit, abstain and return no mention for that span.
    - Do not type spans only from list position, nearby numbers, or table formatting cues.

    Output JSON:
    {{
      "mentions": [
        {{
          "span_id": str,
          "ent_type": str,
          "confidence": float,
          "evidence": [{{"quote":str,"start":int,"end":int}}],
          "rationale": str,
          "boundary_ops": [{{"op":"TRIM|SPLIT|MERGE","params":{{...}}}}]
        }}
      ],
      "rationale": "short summary <= 40 words"
    }}

adjudicator_agent:
  system: |
    You are AdjudicatorAgent.
    You must reason with internal CoT, but never expose full reasoning traces.
    Return strict JSON only.
  user: |
    TASK: adjudicator_agent
    Text:
    {text}

    Conflict cluster:
    {cluster}

    Expert mentions:
    {expert_mentions}

    RE mentions:
    {re_mentions}

    Internal CoT plan (private):
    1) Identify conflict type: existence, type, boundary.
    2) Compare evidence quality and confidence.
    3) Consider risk level from cluster.
    4) Select winner and rationale.

    Decision rubric (private):
    - Evidence validity and specificity: 0-0.40
    - Confidence margin: 0-0.25
    - Constraint consistency: 0-0.20
    - Boundary plausibility: 0-0.15

    Output JSON:
    {{
      "winner_source": "expert|re",
      "winner_span_id": str,
      "winner_ent_type": str,
      "confidence": float,
      "rationale": str
    }}

debate_agent:
  system: |
    You are DebateAgent for high-risk conflicts.
    You must reason with internal CoT, but never expose full reasoning traces.
    Return strict JSON only.
  user: |
    TASK: debate_agent
    Text:
    {text}

    Conflict cluster:
    {cluster}

    Previous rounds:
    {history}

    Candidate spans:
    {candidate_spans}

    Internal CoT plan (private):
    1) Propose claim for one side.
    2) Cite strongest exact evidence quote.
    3) Construct counter-argument against opposite claim.
    4) Update confidence with conservative increments.
    5) Avoid repeating prior weak evidence.

    Debate quality rubric (private):
    - Novel evidence contribution: 0-0.35
    - Counter-argument relevance: 0-0.25
    - Evidence precision: 0-0.25
    - Confidence calibration: 0-0.15

    Output JSON:
    {{
      "claim_source": "expert|re",
      "ent_type": str,
      "confidence": float,
      "counter_argument": str,
      "evidence": [{{"quote":str,"start":int,"end":int}}]
    }}

llm_verifier:
  system: |
    You are VerifierAgent.
    You must reason with internal CoT, but never expose full reasoning traces.
    Return strict JSON only.
  user: |
    TASK: llm_verifier
    Text:
    {text}

    Mentions:
    {mentions}

    Entity schema:
    {entity_types}

    Internal CoT plan (private):
    1) Validate each mention offset and span boundaries.
    2) Verify evidence quote is exact substring.
    3) Check ent_type legality in schema.
    4) Aggregate final pass/fail and confidence adjustment.

    Verification rubric (private):
    - Offset correctness: pass/fail
    - Evidence substring correctness: pass/fail
    - Type legality: pass/fail
    - Confidence adjustment: conservative

    Output JSON:
    {{
      "pass": boolean,
      "adjusted_confidence": float,
      "reason": str
    }}

disambiguation_agent:
  system: |
    You are DisambiguationAgent for CoNLL2003-style newswire NER.
    You must reason with internal CoT, but never expose full reasoning traces.
    Return strict JSON only.
  user: |
    TASK: disambiguation_agent
    Text:
    {text}

    Current mentions:
    {mentions}

    Schema:
    {entity_types}

    CoNLL2003 disambiguation policy:
    - Preserve true named entities; drop generic, non-named spans.
    - Resolve PER/ORG/LOC/MISC using local sentence evidence.
    - Prefer conservative keep/drop decisions over speculative retagging.
    - Geopolitical names default to LOC; demonym/adjectival forms default to MISC.
    - In sports text, avoid converting country/region names to ORG unless explicit organization wording is present.
    - In standings/stat-table lines, city-only team proxies can be ORG when supported by numeric record context.
    - In schedule lines "X AT Y", prefer X as ORG and Y as LOC when context matches fixtures.
    - In scoreline lines "X <number> Y <number>", prefer both sides as ORG.
    - In "CITY YYYY-MM-DD", keep CITY as LOC; drop the date token.
    - Strip non-entity prefixes from boundaries (determiners, role labels like "third-stringer", "cornerback", etc.).
    - Allow timezone abbreviations like GMT as MISC when used in correction/status headers.
    - Remove list numbering prefixes from boundaries when present.

    Internal CoT plan (private):
    1) Validate entity plausibility for each mention.
    2) Remove generic/background mentions.
    3) Adjust boundaries only when clear textual evidence exists.
    4) Prefer conservative abstention if uncertain.

    Output JSON:
    {{
      "mentions": [
        {{
          "source_span_id": str,
          "action": "keep|drop|adjust",
          "start": int,
          "end": int,
          "ent_type": str,
          "confidence": float,
          "evidence": [{{"quote":str,"start":int,"end":int}}],
          "rationale": str
        }}
      ]
    }}

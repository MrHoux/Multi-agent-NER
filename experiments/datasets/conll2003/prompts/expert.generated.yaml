    \ rubric per span (private):\n- Lexical cue support: 0-0.35\n- Context support:\
    \ 0-0.30\n- Schema compatibility: 0-0.20\n- Memory/RAG support: 0-0.15\n- Do not\
    \ use exact surface-form matching rules or dataset-specific keyword lists.\n\n\
    Hard constraints:\n- per_span keys should prefer existing span_id.\n- Evidence\
    \ quote must be substring of text.\n- No evidence => mark low confidence.\n- For\
    \ new_spans, type_hints must be a non-empty subset of schema entity type names\
    \ only.\n- Do not treat pronouns, bare role nouns, common descriptors, dates,\
    \ or pure numbers as entities unless the schema explicitly requires them.\n- Treat\
    \ residual or catch-all schema types as last-resort labels that need stronger\
    \ evidence than primary types.\n\nFallback policy:\n- If uncertain, keep only\
    \ evidence-supported candidate_types and lower confidence instead of widening\
    \ types indiscriminately.\n- If RAG and context disagree, prefer text-grounded\
    \ evidence and note in rag_ack.\n\nOutput JSON:\n{{\n  \"terminology\": [str],\n\
    \  \"triggers\": [str],\n  \"per_span\": {{\n    \"<span_id>\": {{\n      \"candidate_types\"\
    : [str],\n      \"excluded_types\": [str],\n      \"boundary_ops\": [{{\"op\"\
    :\"TRIM|SPLIT|MERGE\",\"params\":{{...}}}}],\n      \"evidence\": [{{\"quote\"\
    :str,\"start\":int,\"end\":int}}],\n      \"confidence\": float\n    }}\n  }},\n\
    \  \"rag_ack\": {{\n    \"handoff_id\": str,\n    \"used_fact_ids\": [str],\n\
    \    \"answered_questions\": [{{\"q_id\": str, \"answer\": str}}],\n    \"notes\"\
    : str\n  }},\n  \"new_spans\": [\n    {{\n      \"start\": int,\n      \"end\"\
    : int,\n      \"text\": str,\n      \"type_hints\": [str],\n      \"confidence\"\
    : float,\n      \"evidence\": [{{\"quote\": str, \"start\": int, \"end\": int}}],\n\
    \      \"rationale\": str\n    }}\n  ],\n  \"rationale\": \"short summary <= 40\

    \ heuristics, focusing solely on schema semantics and local context.\n\nCollaboration\
    \ protocol with RAG (mandatory):\n- Use RAG retrieved_facts only as hints, not\
    \ as hard truth.\n- Resolve RAG open_questions in your per-span constraints.\n\
    - Output rag_ack to state what was used and how disagreements were handled.\n\n\

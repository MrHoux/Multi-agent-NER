    \ based on proper named references in the text, excluding pronouns, generic role\
    \ nouns, common descriptors, dates, and pure numerals unless they are explicitly\
    \ part of a named entity.\n- For PER entities, require explicit textual evidence\
    \ of personal identity.\n- For ORG entities, look for indicators of formal collective\
    \ structure or institutional naming, prioritizing explicit mentions over contextual\
    \ hints.\n- For LOC entities, rely on geographic naming conventions or place-specific\

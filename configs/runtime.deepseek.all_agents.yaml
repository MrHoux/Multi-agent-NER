seed: 42

llm:
  provider: openai_compatible
  base_url: https://api.deepseek.com/v1
  api_key: xxxxxxxx
  model: deepseek-chat
  timeout_s: 45
  max_retries: 2
  retry_backoff_s: 1.5
  temperature: 0.0

output:
  predictions_path: outputs/predictions.runtime.jsonl

data:
  reader_type: generic_jsonl
  data_path: tests/fixtures/tiny_data.jsonl
  schema_path: tests/fixtures/schema_example.json

pipeline:
  sample_max_retries: 2
  sample_retry_backoff_s: 1.0
  sample_post_error_retries: 2
  sample_post_error_backoff_s: 4.0
  progress_logging: true
  progress_agent_trace: false
  parallelize_independent_branches: true

  max_debate_turns: 4
  early_stop_delta: 0.01
  iou_align_threshold: 0.5
  debate_l3_only: true
  l2_threshold: 0.4
  l3_threshold: 0.75

  candidate:
    enable_generic_fallback: true
    fallback_only_when_empty: true
    fallback_max_added: 24
    fallback_min_token_len: 2
    fallback_max_total_spans: 120
    fallback_enable_parenthetical_alias: true
    fallback_enable_descriptor_phrases: false
    fallback_enable_list_context: true
    fallback_enable_schema_profile: true

  allow_expert_span_augmentation: false
  allow_re_span_augmentation: false
  rerun_after_span_augmentation: false
  localize_augmented_ner_inference: true
  max_augmented_spans_per_sample: 20
  augmentation_requires_seed_candidate: true
  augmentation_require_schema_type_hint: true
  augmentation_min_confidence: 0.72
  augmentation_source_min_confidence:
    re: 0.90
  augmentation_reject_overlap_sources: ["re"]
  augmentation_allow_no_seed_high_conf: false
  augmentation_no_seed_min_confidence: 0.85
  augmentation_no_seed_allowed_sources: ["expert"]
  augmentation_reject_negative_rationale: false
  augmentation_require_evidence: true
  augmentation_require_evidence_anchor: true
  augmentation_max_tokens: 14
  augmentation_entity_like_only: false

  mention_reject_negative_rationale: false
  adjudicator_singleton_policy: legacy
  adjudicator_singleton_min_confidence: 0.9
  adjudicator_singleton_require_entity_like: false
  adjudicator_review_all_mentions: true
  final_min_confidence: 0.22

  normalize_candidate_boundaries: true
  boundary_left_modifiers: []
  boundary_right_modifiers: []
  boundary_enable_hyphen_left: true
  boundary_max_right_expansion_steps: 1

  enable_descriptor_expansion: false
  descriptor_terms_from_schema: true
  descriptor_terms: []
  descriptor_left_modifiers: []

  rescue_symbolic_parts_from_hypotheses: false
  enable_parenthetical_alias_extraction: true
  enable_candidate_recall_bridge: false
  enable_candidate_superspan_promotion: false
  enable_final_refine_pass: true
  enable_direct_seed_ner: true
  direct_seed_additional_min_confidence: 0.94
  direct_seed_protected_confidence: 0.92
  direct_seed_same_type_policy: prefer_direct_boundary
  direct_seed_allow_cross_type_override: true
  direct_seed_cross_type_override_margin: 0.06
  direct_seed_cross_type_override_min_confidence: 0.82
  direct_seed_cross_type_override_require_evidence: true
  reapply_direct_seed_after_postprocess: true
  re_structure_support_enabled: true
  re_structure_support_confidence_scale: 0.85
  re_structure_support_min_exclusion_confidence: 0.9

  enable_low_information_filter: false
  low_information_titlecase_confidence_threshold: 0.9
  low_information_descriptor_confidence_threshold: 0.9

  inject_high_value_candidates: false
  lexical_injection_rules: []
  mention_blocklist: []

  enable_disambiguation_agent: true
  disambiguation_lock_confidence: 1.1
  disambiguation_lock_if_non_pipeline: false
  disambiguation_lock_if_direct_anchor: false
  disambiguation_protect_direct_anchor_from_drop: false
  disambiguation_direct_anchor_iou: 0.8
  disambiguation_direct_anchor_min_confidence: 0.97
  disambiguation_allow_drop: true

verifier:
  use_llm: false
  strict_drop_invalid: true

memory:
  enabled: true
  sqlite_path: outputs/memory.runtime.db
  top_k: 2
  promote_threshold: 3
  min_confidence: 0.82
  retrieval_include_candidate: false
  retrieval_min_seen_count: 2
  retrieval_min_confidence: 0.82

rag:
  max_open_questions: 8
  wikipedia:
    enabled: true
    language: en
    max_requests_per_sample: 3
    max_results_per_request: 2
    summary_chars: 420
    timeout_s: 12
    max_retries: 1
    retry_backoff_s: 0.75

ablations:
  w_o_rag: false
  w_o_expert: false
  w_o_re: false
  w_o_debate: false
  w_o_verifier: false
  w_o_memory: false

seed: 42
prompts_path: configs/prompts_cot.yaml

output:
  predictions_path: outputs/predictions.deepseek.jsonl

llm:
  provider: openai_compatible
  base_url: https://api.deepseek.com/v1
  api_key: xxxxxxxxxxx
  model: deepseek-chat
  timeout_s: 60
  max_retries: 5
  retry_backoff_s: 1.5
  temperature: 0.0

data:
  reader_type: generic_jsonl
  data_path: tests/fixtures/tiny_data.jsonl
  schema_path: tests/fixtures/schema_example.json

pipeline:
  max_debate_turns: 5
  early_stop_delta: 0.01
  iou_align_threshold: 0.5
  debate_l3_only: true
  l2_threshold: 0.4
  l3_threshold: 0.75
  candidate:
    enable_generic_fallback: true
    fallback_only_when_empty: true
    fallback_max_added: 32
    fallback_min_token_len: 2
  allow_expert_span_augmentation: true
  allow_re_span_augmentation: true
  rerun_after_span_augmentation: true
  max_augmented_spans_per_sample: 20
  augmentation_requires_seed_candidate: true
  augmentation_require_schema_type_hint: true
  augmentation_min_confidence: 0.72
  augmentation_allow_no_seed_high_conf: false
  augmentation_no_seed_min_confidence: 0.85
  augmentation_no_seed_allowed_sources: ["expert"]
  augmentation_reject_negative_rationale: false
  augmentation_require_evidence: true
  augmentation_require_evidence_anchor: true
  augmentation_entity_like_only: false
  adjudicator_singleton_require_entity_like: false
  normalize_candidate_boundaries: false
  boundary_left_modifiers: []
  boundary_right_modifiers: []
  boundary_enable_hyphen_left: true
  boundary_max_right_expansion_steps: 1
  enable_descriptor_expansion: false
  descriptor_terms_from_schema: true
  descriptor_terms: []
  descriptor_left_modifiers: []
  inject_high_value_candidates: false
  lexical_injection_rules: []
  mention_blocklist: []
  final_min_confidence: 0.2
  enable_direct_seed_ner: true
  direct_seed_additional_min_confidence: 0.94
  direct_seed_protected_confidence: 0.92
  direct_seed_same_type_policy: prefer_direct_boundary
  direct_seed_allow_cross_type_override: true
  direct_seed_cross_type_override_margin: 0.06
  direct_seed_cross_type_override_min_confidence: 0.82
  direct_seed_cross_type_override_require_evidence: true
  reapply_direct_seed_after_postprocess: true
  enable_disambiguation_agent: true
  disambiguation_lock_confidence: 0.85
  disambiguation_lock_if_non_pipeline: false
  disambiguation_lock_if_direct_anchor: true
  disambiguation_protect_direct_anchor_from_drop: true
  disambiguation_direct_anchor_iou: 0.7
  disambiguation_direct_anchor_min_confidence: 0.9
  disambiguation_allow_drop: true

verifier:
  use_llm: false
  strict_drop_invalid: true

memory:
  enabled: true
  sqlite_path: outputs/memory.deepseek.db
  top_k: 2
  promote_threshold: 3
  min_confidence: 0.82
  retrieval_include_candidate: false
  retrieval_min_seen_count: 2
  retrieval_min_confidence: 0.82

rag:
  max_open_questions: 20
  wikipedia:
    enabled: true
    language: en
    max_requests_per_sample: 6
    max_results_per_request: 2
    summary_chars: 420
    timeout_s: 12
    max_retries: 1
    retry_backoff_s: 0.75

ablations:
  w_o_rag: false
  w_o_expert: false
  w_o_re: false
  w_o_debate: false
  w_o_verifier: false
  w_o_memory: false

